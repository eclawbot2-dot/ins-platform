name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # prisma generate never connects; a placeholder satisfies config validation.
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint

      - name: Unit tests
        run: npx vitest run
